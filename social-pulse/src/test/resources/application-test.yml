spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

app:
  security:
    initial-admin-password: admin123
    initial-cm-password: cm123

jwt:
  secret: THIS_IS_A_TEST_SECRET_KEY_FOR_JWT_VALIDATION_PURPOSES_ONLY_12345
  access-expiration: 3600000 # 1 hour
  refresh-expiration: 86400000 # 24 hours
