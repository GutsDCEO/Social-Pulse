spring:
  application:
    name: social-pulse
  profiles:
    active: dev

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:socialpulse_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  security:
    initial-admin-password: ${INITIAL_ADMIN_PASSWORD:admin123}
    initial-cm-password: ${INITIAL_CM_PASSWORD:cm123}

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_RANDOM_STRING_FOR_DEV_ONLY}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000} # 15 mins
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
