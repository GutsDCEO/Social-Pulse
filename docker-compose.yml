version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: socialpulse_db
    environment:
      POSTGRES_DB: ${DB_NAME:-socialpulse_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - socialpulse_pgdata:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-socialpulse_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: socialpulse_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@socialpulse.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - socialpulse_pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./social-pulse
      dockerfile: Dockerfile
    container_name: socialpulse_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=socialpulse_db
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - JWT_SECRET=CHANGE_THIS_TO_A_SECURE_RANDOM_STRING_FOR_PROD
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialpulse_frontend
    environment:
      - VITE_API_URL=http://localhost:8080/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  socialpulse_pgdata:
  socialpulse_pgadmin_data:
